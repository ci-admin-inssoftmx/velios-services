name: Deploy Velios Servicios PRD

on:
  push:
    branches:
      - Produccion

jobs:
  deploy:
    runs-on: windows-latest
    environment: produccion

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configurar NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restaurar paquetes
        shell: pwsh
        run: nuget restore velios.Api.sln

      - name: Publicar Sitio
        shell: pwsh
        run: >
          msbuild velios.Api\velios.Api.csproj
          /p:DeployOnBuild=true
          /p:PublishProfile=Deploy
          /p:Configuration=Release
          /verbosity:minimal

      - name: Validar Publicacion
        shell: pwsh
        run: |
          if (!(Test-Path "velios.Api/obj/Release/net10.0/PubTmp/Out")) {
            throw "No se encontro la carpeta Out"
          }
          Get-ChildItem "velios.Api/obj/Release/net10.0/PubTmp/Out" -Recurse | Select-Object -First 50

      - name: Poner sitio en mantenimiento
        shell: pwsh
        run: |
          $content = "<html><body><h1>Sitio en mantenimiento</h1></body></html>"
          $ftp = [System.Net.FtpWebRequest]::Create("ftp://${{ secrets.FTP_SERVER }}/servicios/prd/app_offline.htm")
          $ftp.Method = [System.Net.WebRequestMethods+Ftp]::UploadFile
          $ftp.Credentials = New-Object System.Net.NetworkCredential("${{ secrets.FTP_USERNAME }}", "${{ secrets.FTP_PASSWORD }}")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($content)
          $ftp.ContentLength = $bytes.Length
          $stream = $ftp.GetRequestStream()
          $stream.Write($bytes, 0, $bytes.Length)
          $stream.Close()

      - name: Deploy FTP PRD
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: velios.Api/obj/Release/net10.0/PubTmp/Out/
          server-dir: /servicios/prd/
          dangerous-clean-slate: false

      - name: Quitar mantenimiento
        shell: pwsh
        run: |
          $ftp = [System.Net.FtpWebRequest]::Create("ftp://${{ secrets.FTP_SERVER }}/servicios/prd/app_offline.htm")
          $ftp.Method = [System.Net.WebRequestMethods+Ftp]::DeleteFile
          $ftp.Credentials = New-Object System.Net.NetworkCredential("${{ secrets.FTP_USERNAME }}", "${{ secrets.FTP_PASSWORD }}")
          $ftp.GetResponse()